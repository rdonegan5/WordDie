<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Random Die Roller</title>
  <link rel="stylesheet" href="styles.css" />

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/three.module.min.js",
        "three/addons/": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div class="layout">
    <section class="card config-card">
      <div class="config-top-row">
        <div class="config-status">
          <div class="result config-heading">Configure</div>
          <p class="muted small config-intro-line">Enter custom text for each side:</p>
        </div>
        <div class="panel-toggle-row toggle-mobile-config">
          <button
            type="button"
            class="btn-small toggle-panel-btn"
            data-toggle-panel
            title="Return to the die"
          >
            View die
          </button>
        </div>
      </div>

      <textarea
        id="sideLabels"
        rows="10"
        placeholder="One side per line&#10;Example:&#10;Yes&#10;No&#10;Maybe"
      ></textarea>

      <div class="sides-info-row">
        <p class="muted small sides-info-label" id="sidesInfo"></p>
        <div class="sides-info-actions">
          <button
            id="reenableSidesBtn"
            type="button"
            class="btn-small"
            title="Remove leading '-' from all sides so they can roll again"
          >
            Re-enable sides
          </button>
          <button
            id="resetSidesBtn"
            type="button"
            class="btn-small"
            title="Reset to six default sides (Side 1 … Side 6)"
          >
            Reset Sides
          </button>
        </div>
      </div>
    </section>

    <section class="card roll-card">
      <div class="roll-top-row">
        <div class="roll-status">
          <div id="resultWrap" class="result" aria-live="polite"></div>
          <div id="rollMeta" class="muted small"></div>
        </div>

        <div class="panel-toggle-row toggle-desktop">
          <button
            id="toggleTrackingPanelBtn"
            type="button"
            class="btn-small toggle-panel-btn"
            data-toggle-panel
            title="Toggle between roll and configuration"
          >
            Show stats
          </button>
        </div>
      </div>

      <hr />

      <div class="roll-body">
        <div id="statsPanel">
          <div class="stats-desktop-only">
            <div class="stats-top-row" style="margin-top: 10px;">
              <div class="stats-top-left">
                <div class="stats-top-left-row">
                  <button
                    id="resetCounts"
                    type="button"
                    class="btn-small"
                    title="Clears roll counts (history kept)"
                  >
                    Reset rolls
                  </button>
                  <h3>Roll tracking</h3>
                </div>

                <div class="small muted" id="totals"></div>
              </div>

              <div class="stats-roll-btn-row">
                <button
                  id="rollBtnStats"
                  type="button"
                  class="roll-btn roll-btn-stats-desktop"
                  style="width: 100%;"
                  title="Roll the die"
                >
                  Roll the die
                </button>
                <div id="perDieRollStats" hidden aria-label="Roll individual dice"></div>
              </div>
            </div>

            <div class="counts-table-wrap" id="countsTables"></div>
          </div>

          <div class="mobile-history-block">
            <div class="history-header" style="margin-top: 14px;">
              <p class="muted" style="margin:0;">History (latest first):</p>
              <button
                id="resetHistoryBtn"
                type="button"
                class="btn-small"
                title="Clears roll history only"
              >
                Reset history
              </button>
            </div>
            <div id="history" class="history"></div>
          </div>
        </div>

        <div id="renderPanel" class="hidden">
        <div class="die-stage">
          <div class="dice-scroll">
            <div id="threeRoot" class="three-root" aria-live="polite"></div>
          </div>
        </div>

        <div class="render-roll-btn-row">
          <p class="mobile-tap-to-roll-hint" id="mobileTapToRollHint" aria-live="polite">
            Tap to Roll!
          </p>
          <button
            type="button"
            id="mobileRemoveSidesBtn"
            class="btn-small mobile-remove-sides-btn"
            disabled
            title="Prefix '-' on each die's last rolled face so it is excluded from rolls"
          >
            Remove sides
          </button>
          <button
            id="rollBtnRender"
            type="button"
            class="roll-btn roll-btn-render-desktop"
            style="width:100%;"
            title="Roll the die"
          >
            Roll the die
          </button>
          <div id="perDieRollRender" class="per-die-roll-row" hidden aria-label="Roll individual dice"></div>
        </div>
      </div>
      </div>
    </section>
  </div>

  <div id="mobileConfigSheet" class="mobile-config-sheet" aria-hidden="true"></div>

  <script type="module" src="app.js?v=20260502_010"></script>
  <script type="text/plain" id="deprecated-inline-script">
    const STORAGE_KEY = "random_die_v2";

    // state.labels[i] corresponds to face (i+1)
    // state.counts[i] tracks how many times face (i+1) rolled
    // state.history stores {ts, text} where text is the side text at roll time.
    let state = {
      labels: [],
      counts: [],
      history: [],
      maxHistory: 50,
    };

    const $ = (id) => document.getElementById(id);

    function clampInt(n, min, max) {
      n = Number(n);
      if (!Number.isFinite(n)) return min;
      n = Math.trunc(n);
      return Math.max(min, Math.min(max, n));
    }

    function defaultLabel(i) {
      return `Side ${i + 1}`;
    }

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function normalizeStateAfterLoad() {
      const MIN_SIDES = 2;

      // Migration / defaults
      if (!Array.isArray(state.labels) || state.labels.length === 0) {
        state.labels = Array.from({ length: 6 }, (_, i) => defaultLabel(i));
      }

      state.labels = state.labels.map((v, i) => {
        const s = typeof v === "string" ? v.trim() : "";
        return s.length ? s : defaultLabel(i);
      });

      // Ensure at least MIN_SIDES
      if (state.labels.length < MIN_SIDES) {
        while (state.labels.length < MIN_SIDES) state.labels.push(defaultLabel(state.labels.length));
      }

      // Counts length match labels length
      const counts = Array.isArray(state.counts) ? state.counts : [];
      state.counts = Array.from({ length: state.labels.length }, (_, i) => {
        const c = counts[i];
        return typeof c === "number" && c >= 0 ? c : 0;
      });

      // Prune history to valid faces
      state.history = Array.isArray(state.history) ? state.history : [];
      // Migrate old entries: {ts, face} -> {ts, text}
      state.history = state.history
        .map(h => {
          if (!h || typeof h !== "object") return null;

          const ts = typeof h.ts === "number" ? h.ts : Date.now();

          if (typeof h.text === "string") {
            return { ts, text: h.text };
          }

          if (typeof h.face === "number") {
            const idx = h.face - 1;
            const text = state.labels[idx] ?? defaultLabel(idx);
            return { ts, text };
          }

          return null;
        })
        .filter(Boolean)
        .slice(-state.maxHistory);
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;

        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return;

        // Backwards-compat if an older version saved {sides, labels, counts, history}
        if (Array.isArray(parsed.labels)) state.labels = parsed.labels;
        else if (typeof parsed.sides === "number") {
          const n = clampInt(parsed.sides, 2, 1000);
          state.labels = Array.from({ length: n }, (_, i) => defaultLabel(i));
        }

        if (Array.isArray(parsed.counts)) state.counts = parsed.counts;
        if (Array.isArray(parsed.history)) state.history = parsed.history;
        if (typeof parsed.maxHistory === "number") state.maxHistory = parsed.maxHistory;
      } catch {
        // Corrupted storage: ignore and use defaults
      }
    }

    function renderSideInputs() {
      const container = $("sideLabels");
      container.innerHTML = "";

      const MIN_SIDES = 2;
      const n = state.labels.length;

      $("sidesInfo").textContent = `Current sides: ${n}`;

      state.labels.forEach((label, idx) => {
        const row = document.createElement("div");
        row.className = "side-row";

        const input = document.createElement("input");
        input.type = "text";
        input.value = label;

        const minusBtn = document.createElement("button");
        minusBtn.className = "btn-small";
        minusBtn.type = "button";
        minusBtn.textContent = "-";
        minusBtn.title = `Remove side ${idx + 1}`;
        minusBtn.disabled = n <= MIN_SIDES;

        input.addEventListener("input", () => {
          state.labels[idx] = input.value;
          saveState();
          renderCounts();
        });

        minusBtn.addEventListener("click", () => removeSideAtIndex(idx));

        row.appendChild(input);
        row.appendChild(minusBtn);

        container.appendChild(row);
      });
    }

    function renderCounts() {
      const body = $("countsBody");
      body.innerHTML = "";

      for (let i = 0; i < state.labels.length; i++) {
        const face = i + 1;

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${face}</td>
          <td>${escapeHtml(state.labels[i])}</td>
          <td>${state.counts[i] ?? 0}</td>
        `;
        body.appendChild(tr);
      }

      const total = state.counts.reduce((a, b) => a + (b || 0), 0);
      $("totals").textContent = `Total rolls: ${total}`;
    }

    function renderHistory() {
      const box = $("history");
      box.innerHTML = "";

      if (!state.history.length) {
        box.innerHTML = `<div class="muted">No rolls yet.</div>`;
        return;
      }

      // Latest first
      const items = [...state.history].sort((a, b) => b.ts - a.ts);
      for (const h of items) {
        const div = document.createElement("div");
        div.className = "hist-item";
        div.textContent = `${new Date(h.ts).toLocaleString()} — ${h.text}`;
        box.appendChild(div);
      }
    }

    function renderResult(face, text) {
      $("resultWrap").textContent = `You rolled: ${text}`;
      $("rollMeta").textContent = `Face ${face} — rolled ${state.counts[idx] ?? 0} time(s).`;
    }

    function addSide() {
      state.labels.push(defaultLabel(state.labels.length));
      state.counts.push(0);
      // If history is empty or valid, no need to change it when adding.
      saveState();

      renderSideInputs();
      renderCounts();
      renderHistory();
      $("resultWrap").textContent = "";
      $("rollMeta").textContent = "";
    }

    function removeSideAtIndex(removeIdx) {
      const MIN_SIDES = 2;
      if (state.labels.length <= MIN_SIDES) return;

      // Remove label + count
      state.labels.splice(removeIdx, 1);
      state.counts.splice(removeIdx, 1);

      saveState();
      renderSideInputs();
      renderCounts();
      renderHistory();
      $("resultWrap").textContent = "";
      $("rollMeta").textContent = "";
    }

    function rollOnce() {
      const n = state.labels.length;
      const face = Math.floor(Math.random() * n) + 1;
      const idx = face - 1;
      const text = state.labels[idx] ?? `Side ${face}`;

      state.counts[idx] = (state.counts[idx] ?? 0) + 1;
      state.history.push({ ts: Date.now(), text });

      if (state.history.length > state.maxHistory) {
        state.history = state.history.slice(-state.maxHistory);
      }

      saveState();

      renderResult(face, text);
      renderCounts();
      renderHistory();
    }

    function resetRolls() {
      state.counts = state.labels.map(() => 0);
      saveState();

      $("resultWrap").textContent = "";
      $("rollMeta").textContent = "";
      renderCounts();
      renderHistory();
    }

    function resetHistory() {
      state.history = [];
      saveState();
      $("resultWrap").textContent = "";
      $("rollMeta").textContent = "";
      renderHistory();
    }

    // Init
    loadState();
    normalizeStateAfterLoad();

    renderSideInputs();
    renderCounts();
    renderHistory();
    $("resultWrap").textContent = "";
    $("rollMeta").textContent = `Roll a face from 1..${state.labels.length}.`;

    $("addSideBtn").addEventListener("click", addSide);
    $("rollBtn").addEventListener("click", rollOnce);
    $("resetCounts").addEventListener("click", resetRolls);
    $("resetHistoryBtn").addEventListener("click", resetHistory);
  </script>
</body>
</html>
